<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 680 300">
  <defs>
    <linearGradient id="goldgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4AF6A"/>
      <stop offset="100%" stop-color="#B8963E"/>
    </linearGradient>
  </defs>

  <!-- Icône -->
  <g transform="translate(170, 70)">
    <path d="M0 140 Q60 0 120 140" fill="none" stroke="#0C2340" stroke-width="14" stroke-linecap="round"/>
    <line x1="22" y1="98" x2="98" y2="98" stroke="url(#goldgrad)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="120" cy="140" r="8" fill="url(#goldgrad)"/>
    <circle cx="0" cy="140" r="8" fill="#0C2340"/>
  </g>

  <!-- Texte -->
  <text x="330" y="165"
    font-family="Georgia, serif"
    font-size="72"
    font-weight="400"
    fill="#0C2340"
    letter-spacing="6"
    text-anchor="middle">ALLODO</text>

  <!-- Sous-titre -->
  <text x="330" y="200"
    font-family="Georgia, serif"
    font-size="13"
    fill="#B8963E"
    letter-spacing="5"
    text-anchor="middle">FINANCIAL SOLUTIONS</text>

  <!-- Ligne décorative -->
  <line x1="240" y1="212" x2="420" y2="212" stroke="#B8963E" stroke-width="0.8" opacity="0.5"/>
</svg>
